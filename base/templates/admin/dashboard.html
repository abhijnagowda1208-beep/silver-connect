<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

.admin-container {
    padding: 30px;
}

.admin-title {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #2c3e50;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.stat-card {
    padding: 25px;
    border-radius: 16px;
    color: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    transition: transform 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-6px);
}

.total {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
}

.active {
    background: linear-gradient(135deg, #11998e, #38ef7d);
}

.inactive {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

.stat-number {
    font-size: 36px;
    font-weight: bold;
    margin-top: 10px;
}

.admin-link {
    margin-top: 30px;
}

.admin-link a {
    color: #2575fc;
    font-weight: 600;
    text-decoration: none;
}
.card-link {
    text-decoration: none;
}
</style>

<div class="admin-container">

    <div class="admin-title">
        👋 Welcome, Admin <span style="color:#2575fc;">admin23</span>
    </div>

   <div class="stats-grid">

    <a href="{% url 'members_list' 'all' %}" class="card-link">
        <div class="stat-card total">
            <h3>Total Members</h3>
            <div class="stat-number">{{ total_members }}</div>
        </div>
    </a>

    <a href="{% url 'members_list' 'active' %}" class="card-link">
        <div class="stat-card active">
            <h3>Active Members</h3>
            <div class="stat-number">{{ active_members }}</div>
        </div>
    </a>

    <a href="{% url 'members_list' 'inactive' %}" class="card-link">
        <div class="stat-card inactive">
            <h3>Inactive Members</h3>
            <div class="stat-number">{{ inactive_members }}</div>
        </div>
    </a>

</div>
